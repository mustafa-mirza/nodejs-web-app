apiVersion: v1
kind: Service
metadata:
  name: auth-api-nr-ni-alp320-80-service
spec:
  selector:
    app: auth-api-nr-ni-alp320-80
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api-nr-ni-alp320-80
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-api-nr-ni-alp320-80
  template:
    metadata:
      labels:
        app: auth-api-nr-ni-alp320-80
    spec:
      containers:
      - name: auth-api-nr-ni-alp320-80
        image: mustafamirza/nr-ni-auth-api-ironalpine3.20:asp3.3.60
        imagePullPolicy: Always
        resources:
          requests:
            memory: "256Mi"   # Reserved: The pod is guaranteed this much
            cpu: "100m"      # Reserved: 0.05 of a CPU core
          limits:
            memory: "512Mi"  # Cap: Pod will be killed (OOM) if it exceeds this
            cpu: "200m"     # Cap: Pod will be throttled if it tries to use more
        securityContext:
          runAsNonRoot: false
#          runAsUser: 101
          allowPrivilegeEscalation: true
#          capabilities:
#            drop: ["ALL"]
        ports:
        - containerPort: 3001
        env:
        - name: JWT_SECRET
          value: "c0ef9dd6ad30813c71ee5bf916ae853d8bb64af6f2926ca7e7e5ff9255bf6f1d"
        - name: JWT_EXPIRY
          value: "1h"
        - name: WEB_PORT
          value: "3000"
        - name: NODE_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        - name: USER1_NAME
          value: "admin"
        - name: USER1_PASS
          value: "Admin1234!"
        - name: USER2_NAME
          value: "user"
        - name: USER2_PASS
          value: "User1234!"
        - name: ORCH_IP
          value: "192.168.103.80"
        - name: ORCH_PORT
          value: "8443"
        - name: PLUGIN_ID
          value: "9705e521-a928-4750-bfa7-5f6563829908"
        - name: CLIENT_CRDS
          value: "z4s2-qrkp4367524--9d_-_7t-h9nrr!qt7"
        - name: DEBUG_LOGS
          value: "true"
        - name: INFO_LOGS
          value: "true"
        - name: ERROR_LOGS
          value: "true"
        - name: AVCD_SERVICE_TAG
          value: "ni-r-rw-auth-api-customavcd"
        - name: LOG_TO_STDOUT
          value: "false"
        - name: LD_PRELOAD
          value: "/opt/avcd/lib64/libadpl.so"
#        livenessProbe:
#          httpGet:
#            path: /health
#            port: 3001
#          initialDelaySeconds: 15
#          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: web-app-nr-ni-alp320-80-service
spec:
  type: NodePort
  selector:
    app: web-app-nr-ni-alp320-80
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30010
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-nr-ni-alp320-80
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app-nr-ni-alp320-80
  template:
    metadata:
      labels:
        app: web-app-nr-ni-alp320-80
    spec:
      containers:
      - name: web-app-nr-ni-alp320-80
        image: mustafamirza/nr-ni-web-app-ironalpine3.20:asp3.3.60
        imagePullPolicy: Always
        resources:
          requests:
            memory: "256Mi"   # Reserved: The pod is guaranteed this much
            cpu: "100m"      # Reserved: 0.05 of a CPU core
          limits:
            memory: "512Mi"  # Cap: Pod will be killed (OOM) if it exceeds this
            cpu: "200m"     # Cap: Pod will be throttled if it tries to use more
        securityContext:
          runAsNonRoot: false
#          runAsUser: 101
          allowPrivilegeEscalation: true
#          capabilities:
#            drop: ["ALL"]
        ports:
        - containerPort: 3000
        env:
        - name: AUTH_API_URL
          value: "http://auth-api-nr-ni-alp320-80-service:3001"
        - name: NODE_ENV
          value: "production"
        - name: ORCH_IP
          value: "192.168.103.80"
        - name: ORCH_PORT
          value: "8443"
        - name: PLUGIN_ID
          value: "9705e521-a928-4750-bfa7-5f6563829908"
        - name: CLIENT_CRDS
          value: "z4s2-qrkp4367524--9d_-_7t-h9nrr!qt7"
        - name: DEBUG_LOGS
          value: "true"
        - name: INFO_LOGS
          value: "true"
        - name: ERROR_LOGS
          value: "true"
        - name: AVCD_SERVICE_TAG
          value: "ni-r-rw-web-app-customavcd"
        - name: LOG_TO_STDOUT
          value: "false"
        - name: LD_PRELOAD
          value: "/opt/avcd/lib64/libadpl.so"
